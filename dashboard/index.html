  <body>
    <!-- SVG Liquid Glass Filter — oculto, referenciado por CSS -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="0"
      height="0"
      style="position:absolute;pointer-events:none;overflow:hidden"
      aria-hidden="true"
    >
      <defs>
        <filter id="liquid-glass-filter" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blurred" />
          <feTurbulence type="fractalNoise" baseFrequency="0.018 0.022" numOctaves="3" seed="5" result="noise" />
          <feDisplacementMap in="blurred" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G" result="displaced" />
          <feComposite in="displaced" in2="SourceGraphic" operator="atop" />
        </filter>
        <filter id="liquid-glass-sm" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.025 0.030" numOctaves="2" seed="8" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
